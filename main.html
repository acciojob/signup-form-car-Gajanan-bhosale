<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->

	<form method="post">

		<label for="name">Name</label>
		<input type="text" id="name" placeholder="Name" required/>

		<lable for="email">Email</lable>
		<input type="email" id="email" placeholder="Eamil" required/>	

		<label for="gender_m">Male</label>
		<input type="radio" id="gender_m" name="gender" required/>
		<lable for="gender_f">Female</lable>
		<input type="radio" id="gender_f" name="gender" required/>

		<label id="cars">Car Brands</label>
		<select id="cars" placeholde="--Please choose an option--"
			required>
			<option>BMW</option>
			<option>AUDI</option>
			<option>TATA</option>
		</select>

		<label for="age">Age</label>
		<input type="number" id="age" placeholder="Age" required/>

		<lable for="dob">DOB</lable>
		<input type="date" id="dob" required/>

		<lable for="tel">Phone Number</lable>
		<input type="tel" id="tel" placeholder="xxx-xxx-xxxx" required/>

		<lable for="password">Password</lable>
		<input type="password" id="password" placeholder="Password" required/>

		<label for="tos">I agree to the TOS</label>
		<input type="checkbox" id="tos" required/>
		<button type="submit">
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
